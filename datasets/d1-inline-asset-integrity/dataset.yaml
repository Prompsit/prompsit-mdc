# MDC submission metadata (dry-run ready). Archive = open layer only
# (dev references + test inputs + contrastive). Hidden split and
# withheld test references are never uploaded.
file_path: open-v1.0.tar.gz
datasheet_path: DATASHEET.md

name: Prompsit D1 - Inline Asset Integrity
shortDescription: MT benchmark for preserving inline tags, placeholders and ICU markup under translation; EN to 9 languages.
longDescription: >
  An evaluation benchmark that tests whether machine translation keeps inline
  localization assets intact: XLIFF and HTML markup, printf and brace
  placeholders, template variables, ICU MessageFormat, inline Markdown, and
  do-not-translate spans. English UI strings are paired with human translations
  from permissively licensed, key-aligned localization catalogs (Apache
  OpenOffice, Chromium, AOSP, DSpace, Godot, Flutter Gallery): 599 source
  strings x 9 target languages (ca/es/fr/it/pt-PT/de/nl/pl/ru) = 5,391 records
  with the same class profile in every language. Scoring is fully automatic:
  for each record, deterministic checks compare the assets in the system output
  against the source and report which of nine error categories occur; a record
  passes when none does, and a system's score is its pass rate, reported
  overall and per category. Reference labels are generated automatically from
  the source, not human-annotated. No training set is shipped; the dev split is
  a small labelled set for optional few-shot prompting or sanity checks. The
  open layer contains the dev split (with references), the test inputs
  (references withheld), and a contrastive pack of (correct, damaged) minimal
  pairs; the hidden split is not distributed. The scoring code is open-source
  at https://github.com/Prompsit/prompsit-mdc - see DATASHEET.md inside the
  archive for construction method, checks, and limits.

