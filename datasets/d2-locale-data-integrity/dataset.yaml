# MDC submission metadata (dry-run ready). Archive = open layer only
# (dev references + test inputs + contrastive). Hidden split and
# withheld test references are never uploaded.
file_path: open-v1.0.tar.gz
datasheet_path: DATASHEET.md

name: Prompsit D2 - Locale-data Integrity
shortDescription: MT benchmark for adapting numbers, dates, units and currency to the target locale; en-US to 9 locales.
longDescription: >
  An evaluation benchmark that tests whether machine translation renders
  locale-sensitive values - numbers, dates, currency amounts, and physical
  units - in the target-locale convention instead of copying the source form
  through; the value itself must not change (no exchange rates, no
  metrication). Each of 680 source items embeds one value in a human-translated
  sentence shared with the D1 inline-asset dataset, across nine target locales
  (ca-ES/es-ES/fr-FR/it-IT/pt-PT/de-DE/nl-NL/pl-PL/ru-RU) = 6,120 records; the
  expected target-locale forms come from Unicode CLDR data via Babel. Scoring
  is fully automatic: for each record, deterministic checks compare the
  rendered value in the system output against the target-locale forms and
  report which of six error categories occur (wrong decimal separator, wrong
  grouping, mis-converted date/time, broken currency format, wrong unit
  format, missing entity); a record passes when none does, and a system's
  score is its pass rate, reported overall and per category. Reference labels
  are generated automatically from the source, not human-annotated. No
  training set is shipped; the dev split is a small labelled set for optional
  few-shot prompting or sanity checks. The open layer contains the dev split
  (with references), the test inputs (references withheld), and a contrastive
  pack of (correct, damaged) minimal pairs; the hidden split is not
  distributed. The scoring code is open-source at
  https://github.com/Prompsit/prompsit-mdc - see DATASHEET.md inside the
  archive for construction method, checks, and limits.

